{% extends "base.html" %}

{% block title %}
Register | Secure QR Code System
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7 col-lg-6">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-success text-white text-center">

                <h3>
                    <i class="fa-solid fa-user-plus"></i>
                    Create Account
                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST" action="{{ url_for('auth.register') }}">

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Choose a username"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Create a password"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            name="confirm_password"
                            class="form-control"
                            placeholder="Confirm your password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="fa-solid fa-user-plus"></i>
                            Register

                        </button>

                    </div>

                </form>

            </div>

            <div class="card-footer text-center">

                <p class="mb-0">

                    Already have an account?

                    <a href="{{ url_for('auth.login') }}">
                        Login Here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
